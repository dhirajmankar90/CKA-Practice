apiVersion: v1
kind: Pod
metadata:
  name: configmap-demo-pod
  namespace: game-demo-ns
spec:
  containers:
    - name: demo
      image: alpine
      command: ["sleep", "3600"]
      env:
        # Define the environment variable
        - name: APP # Notice that the case is different here
                                     # from the key name in the ConfigMap.
          valueFrom:
            configMapKeyRef:
              name: game-demo-cm         # The ConfigMap this value comes from.
              key: APP # The key to fetch.
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: game-demo-cm
              key: LOG_LEVEL
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: game-demo-cm
              key: ENV
      