apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmap-demo-deployment
  namespace: game-demo-ns

spec:
  replicas: 1

  selector:
    matchLabels:
      app: configmap-demo
  template:
    metadata:
      labels:
        app: configmap-demo

    spec:
      containers:
      - name: demo
        image: nginx
        env:
        - name: APP
          valueFrom:
            configMapKeyRef:
              name: game-demo-cm
              key: APP

        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: game-demo-cm
              key: LOG_LEVEL

        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: game-demo-cm
              key: ENV
        volumeMounts:
        - name: config-volume
          mountPath: "/usr/share/nginx/html"
      volumes:
      - name: config-volume
        configMap:
          name: game-demo-cm
          items:
          - key: APP  
            path: APP
          - key: index.html
            path: index.html